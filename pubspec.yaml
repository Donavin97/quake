name: quaketrack
description: "A new Flutter project."
publish_to: 'none'

version: 1.5.0+29

environment:
  sdk: '>=3.4.3 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.6
  http: ^1.2.1
  provider: ^6.1.2
  go_router: ^17.1.0
  firebase_core: ^4.4.0
  firebase_messaging: ^16.1.1
  flutter_local_notifications: ^20.1.0
  cloud_firestore: ^6.1.2
  shared_preferences: ^2.2.2
  geolocator: ^14.0.2
  firebase_auth: ^6.1.4
  google_sign_in: ^6.3.0
  url_launcher: ^6.3.0
  intl: any
  flutter_map: ^8.2.2 # Reverted to previous working version
  firebase_crashlytics: ^5.0.7
  rxdart: ^0.28.0
  latlong2: ^0.9.1 # Reverted to original, will let flutter_map update its dependency

  dio: ^5.4.3
  dart_geohash: ^2.1.0
  introduction_screen: ^4.0.0
  web_socket_channel: ^3.0.3
  share_plus: ^12.0.1
  screenshot: ^3.0.0
  path_provider: ^2.1.2 # Added for temporary file storage
  cross_file: ^0.3.4 # Added for XFile
  google_mobile_ads: ^7.0.0
  uuid: ^4.0.0 # Added for generating unique IDs
  fl_chart: ^0.69.0
  just_audio: ^0.9.40
  vibration: ^2.0.0
  timezone: ^0.10.0
  shimmer: ^3.0.0
  flutter_map_marker_cluster: ^8.2.2
  flutter_cache_manager: ^3.4.1
  flutter_localizations:
    sdk: flutter
  quick_actions: ^1.1.0
  device_info_plus: ^11.5.0
  sensors_plus: ^6.1.1
  battery_plus: ^6.1.1
  get_it: ^8.0.0
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5
  flutter_background_service: ^5.1.0

  audio_session: any
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0
dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter
  mockito: ^5.4.4
  build_runner: ^2.4.11
  riverpod_generator: ^2.4.0

  flutter_launcher_icons: ^0.13.1

  flutter_lints: ^6.0.0
  analyzer: ^6.4.1
  freezed: ^2.5.2
  json_serializable: ^6.8.0

flutter_launcher_icons:
  android: "launcher_icon"
  ios: false
  image_path: "assets/branding/app_icon.png"
  adaptive_icon_background: "#0F1115"
  adaptive_icon_foreground: "assets/branding/app_icon.png"

flutter:
  generate: true
  uses-material-design: true

  assets:
    - assets/

  fonts:
    - family: Oswald
      fonts:
        - asset: fonts/Oswald-Bold.ttf
          weight: 700
    - family: Roboto
      fonts:
        - asset: fonts/Roboto-Medium.ttf
          weight: 500
    - family: OpenSans
      fonts:
        - asset: fonts/OpenSans-Regular.ttf
          weight: 400
