<svg width="1024" height="500" viewBox="0 0 1024 500" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Dark Obsidian Background -->
  <rect width="1024" height="500" fill="#0F1115"/>
  
  <!-- Subtle Grid Pattern (Tectonic) -->
  <path d="M0 100H1024M0 200H1024M0 300H1024M0 400H1024M100 0V500M200 0V500M300 0V500M400 0V500M500 0V500M600 0V500M700 0V500M800 0V500M900 0V500" 
        stroke="#2196F3" stroke-opacity="0.05" stroke-width="1"/>

  <!-- Left Side: Logo Element -->
  <g transform="translate(100, 100) scale(0.25)">
    <circle cx="512" cy="512" r="450" fill="#1C1F26"/>
    <path d="M100 512H340L400 200L512 800L580 400L630 512H924" 
          stroke="#FF5722" stroke-width="100" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- Right Side: Branding -->
  <text x="400" y="240" font-family="Arial, sans-serif" font-weight="900" font-size="96" fill="white" letter-spacing="4">QUAKETRACK</text>
  <text x="400" y="300" font-family="Arial, sans-serif" font-weight="600" font-size="32" fill="#2196F3">REAL-TIME SEISMIC MONITORING</text>
  
  <!-- Magma Accent Line -->
  <rect x="400" y="330" width="450" height="8" rx="4" fill="#FF5722"/>

  <!-- Subtle Waveform Background (Right Side) -->
  <path d="M700 400 Q 750 300, 800 400 T 900 400" stroke="#FF5722" stroke-width="4" fill="none" opacity="0.3"/>
</svg>
